baseurl = "https://miradasiatica.com/"
title = "Mirada Asiática"
languageCode = "es-es"
defaultContentLanguage = "es"
theme = "roadster"

[pagination]
  pagerSize = 10

[permalinks]
  [permalinks.term]
    tags = '/:slug/'

[taxonomies]
  category = "categories"
  tag = "tags"
  author = "authors"

[markup.goldmark.renderer]
  unsafe = true

[menu]
  [[menu.main]]
    name = "Inicio"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Japón"
    url = "/categories/japon/"
    weight = 2
  [[menu.main]]
    name = "Corea"
    url = "/categories/corea/"
    weight = 3
  [[menu.main]]
    name = "China"
    url = "/categories/china/"
    weight = 4
  [[menu.main]]
    name = "Más Asia"
    url = "/categories/mas-asia/"
    weight = 5
  [[menu.main]]
    name = "Series"
    url = "/categories/series/"
    weight = 6
  [[menu.main]]
    name = "Clásicos"
    url = "/categories/clasicos/"
    weight = 7
  [[menu.main]]
    name = "Festivales"
    url = "/categories/festivales/"
    weight = 8

[Params]
customCSS = ["css/custom.css"]
highlightColor = "#990000"
  description = "Blog sobre cine asiático: reseñas, noticias y festivales"
  opengraph = true
  readmore = false
  authorbox = true
  pager = true
  post_meta = ["date", "categories"]
  mainSections = ["post"]

[Params.logo]
image = "img/logo-ma.png"
title = "Mirada Asiática"
  subtitle = "Cine asiático: reseñas, noticias y festivales"

[Params.sidebar]
  home = "right"
  list = "right"
  single = "right"
  widgets = ["search", "afiliados"]

[Params.widgets]
  recent_num = 5
  tags_counter = false
