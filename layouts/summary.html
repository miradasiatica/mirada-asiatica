<article class="list__item post">
<div class="summary-row">
  {{- if $thumbnail := .Params.thumbnail }}
  <a class="summary-row__thumb" href="{{ .RelPermalink }}">
    <img src="{{ $thumbnail | relURL }}" alt="{{ .Title }}">
  </a>
  {{- end }}
  <div class="summary-row__body">
    <header class="list__header">
    <h2 class="list__title post__title">
    <a href="{{ .RelPermalink }}" rel="bookmark">{{ .Title }}</a>
    </h2>
    {{ with partial "post_meta.html" . -}}
    <div class="list__meta meta">{{ . }}</div>
    {{- end }}
    </header>
    <div class="content list__excerpt post__content clearfix">
    {{ .Summary }}
    </div>
    {{- if .Site.Params.readmore }}
    {{- if .Truncated }}
    <div class="list__footer clearfix">
    <a class="list__footer-readmore btn" href="{{ .RelPermalink }}">{{ T "read_more" }}</a>
    </div>
    {{- end }}
    {{- end }}
  </div>
</div>
</article>

<style>
.summary-row {
  display: grid;
  grid-template-columns: clamp(84px, 24%, 130px) minmax(0, 1fr);
  gap: 1.25rem;
  padding-top: 1.5rem;
}
.summary-row__thumb {
  grid-column: 1;
  grid-row: 1;
  width: 100%;
}
.summary-row__thumb img {
  width: 100%;
  aspect-ratio: 2 / 3;
  object-fit: cover;
  border-radius: 5px;
  display: block;
}
.summary-row__body {
  display: contents;
}
.summary-row__body .list__header {
  grid-column: 2;
  grid-row: 1;
  min-width: 0;
}
.summary-row__body .list__excerpt {
  grid-column: 1 / -1;
  grid-row: 2;
  margin-top: 0;
}
.summary-row__body .list__footer {
  grid-column: 1 / -1;
  grid-row: 3;
}
@media (max-width: 600px) {
  .summary-row {
    grid-template-columns: 150px minmax(0, 1fr);
    column-gap: 1rem;
    row-gap: 1rem;
  }
}
</style>
