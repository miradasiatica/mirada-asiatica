{{- with .Site.Data.afiliados }}
<div class="widget-afiliados widget">
  <h4 class="widget__title">Para tu estantería</h4>
  <p class="meta widget-afiliados__disclosure"><a href="{{ "about/" | relURL }}#afiliación">Recomendaciones de Alberto · enlaces de afiliado</a></p>
  <div class="widget__content">
    <div class="afiliados-grid">
      {{- range . }}
      <a class="afiliados-item" href="{{ .enlace }}" target="_blank" rel="nofollow sponsored noopener" title="{{ .titulo }}">
        <img src="{{ .imagen | relURL }}" alt="{{ .titulo }}">
      </a>
      {{- end }}
    </div>
  </div>
</div>
<style>
.widget-afiliados__disclosure {
  margin: 0.25rem 0 0.75rem;
}
.afiliados-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
.afiliados-item {
  display: block;
  border-radius: 4px;
  overflow: hidden;
  transition: opacity 0.2s;
}
.afiliados-item:hover { opacity: 0.85; }
.afiliados-item img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
}
</style>
{{- end }}
