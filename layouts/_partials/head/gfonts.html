{{- $googleFontsLink := .Site.Params.googleFontsLink | default "https://fonts.googleapis.com/css?family=Open+Sans:400,400i,700" }}
{{- if hasPrefix $googleFontsLink "https://fonts.googleapis.com/" }}
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="//fonts.googleapis.com">
<link rel="dns-prefetch" href="//fonts.gstatic.com">
<link rel="preload" {{ printf `href="%s"` $googleFontsLink | safeHTMLAttr }} as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" {{ printf `href="%s"` $googleFontsLink | safeHTMLAttr }}></noscript>
{{- end }}
