{{- $img := partial "head/resolve-share-image.html" . }}

{{- if $img.URL }}
<meta property="og:image" content="{{ $img.URL }}">
{{- if $img.Width }}
<meta property="og:image:width" content="{{ $img.Width }}">
{{- end }}
{{- if $img.Height }}
<meta property="og:image:height" content="{{ $img.Height }}">
{{- end }}
{{- end }}
